server:
  port: 8084

spring:
  application:
    name: budget-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pocketstock_main?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pocketstock.budget.domain
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pocketstock: DEBUG
    org.mybatis: DEBUG
