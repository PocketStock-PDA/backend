server:
  port: 8081

spring:
  application:
    name: core-api

  # DB A (pocketstock_main @ mysql-a:3306) - user/asset/budget/portfolio/notification
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pocketstock_main?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}            # 필수(기본값 없음) — 미설정 시 기동 실패. 32바이트 이상
  validity-ms: 1800000          # access token 30분
  refresh-validity-ms: 1209600000  # refresh token 14일

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pocketstock: DEBUG
    org.mybatis: DEBUG

---
# local 프로파일 = 개발 전용. 운영에선 이 프로파일을 켜지 않으므로 ${JWT_SECRET}(필수) 유지.
spring:
  config:
    activate:
      on-profile: local
jwt:
  secret: pocketstock-local-dev-secret-please-change-in-prod-0123456789  # 개발 전용(운영 금지)
