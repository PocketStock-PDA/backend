server:
  port: 8081

spring:
  application:
    name: core-api

  # Feign HTTP 클라이언트를 OkHttp로 교체 — 기본 HttpURLConnection은 PATCH를 지원하지 않음.
  cloud:
    openfeign:
      okhttp:
        enabled: true

  # DB A (pocketstock_main @ mysql-a:3306) - user/asset/budget/portfolio/notification
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pocketstock_main?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:                              # 알림 이벤트 구독(#204)
      group-id: core-notification
      auto-offset-reset: earliest          # 새 그룹은 처음부터(놓친 이벤트 흡수)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false            # 처리 성공 후 수동 ack(at-least-once)
    listener:
      ack-mode: record

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# core→ledger 내부 호출(잔돈 스캔: collection_settings·환율 read). 원장 쓰기 아님(읽기 전용).
feign:
  ledger-api:
    url: ${LEDGER_API_URL:http://localhost:8082}

jwt:
  secret: ${JWT_SECRET}            # 필수(기본값 없음) — 미설정 시 기동 실패. 32바이트 이상
  validity-ms: 1800000          # access token 30분
  refresh-validity-ms: 1209600000  # refresh token 14일

# refresh token HttpOnly 쿠키 설정
auth:
  refresh-cookie:
    secure: true   # HTTPS에서만 전송. 로컬(http)은 application-local.yml에서 false로 override

# 웹푸시(VAPID) — 공개키는 프론트와 동일 값 공유(NEXT_PUBLIC_VAPID_PUBLIC_KEY)
webpush:
  vapid:
    public-key: BGxo3FXXkwRcGcvyDI8--Vbu4UmVD14FQlUOkvDx3LS3RNKYMA-B8AvU2PK_2qEnSP_rYK0zC_TnVk51w9yv8Kc
    private-key: ${VAPID_PRIVATE_KEY}   # 비밀(기본값 없음) — 운영 env 주입, local은 application-local.yml
    subject: ${VAPID_SUBJECT:mailto:admin@pocketstock.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pocketstock: DEBUG
    org.mybatis: DEBUG