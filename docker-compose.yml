# 로컬 개발 인프라 — MySQL(DB A/B) · Redis · Kafka
# 서비스(8개)는 IDE에서 실행하거나, 이미지 빌드 후 이 파일에 추가
# 실행: docker compose up -d

services:
  # DB A (일반, pocketstock_main) — mysql-a 인스턴스
  mysql-a:
    image: mysql:8.0
    container_name: pocketstock-mysql-a
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: localdev
    volumes:
      - ./scripts/mysql-a-init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./scripts/stock-master/cards_seed.sql:/docker-entrypoint-initdb.d/02-cards-seed.sql
      - ./scripts/stock-master/dividend_stocks_seed.sql:/docker-entrypoint-initdb.d/02b-dividend-seed.sql
      - ./scripts/mysql-a-persona-seed.sql:/docker-entrypoint-initdb.d/03-persona-seed.sql
      - ./scripts/mysql-a-persona-seed-extra.sql:/docker-entrypoint-initdb.d/04-persona-extra.sql
      - mysql-a-data:/var/lib/mysql

  # DB B (원장, pocketstock_ledger, 물리 격리) — mysql-b 인스턴스
  mysql-b:
    image: mysql:8.0
    container_name: pocketstock-mysql-b
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: localdev
    volumes:
      # initdb.d: 빈 볼륨(첫 up / down -v 후)에서만 알파벳순 1회 실행 → 평소 up은 자동 스킵
      - ./scripts/mysql-b-init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./scripts/stock-master/tradable_stocks_seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./scripts/mysql-b-persona-seed.sql:/docker-entrypoint-initdb.d/03-persona-seed.sql
      - ./scripts/mysql-b-persona-seed-extra.sql:/docker-entrypoint-initdb.d/04-persona-extra.sql
      - mysql-b-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: pocketstock-redis
    ports:
      - "6379:6379"

  # Kafka (Apache 공식, KRaft 모드 — Zookeeper 불필요)
  kafka:
    image: apache/kafka:3.8.0
    container_name: pocketstock-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1

volumes:
  mysql-a-data:
  mysql-b-data:
