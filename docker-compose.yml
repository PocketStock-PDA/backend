# 로컬 개발 인프라 — MySQL(RDS-A/B 모사) · Redis · Kafka
# 서비스(8개)는 IDE에서 실행하거나, 이미지 빌드 후 이 파일에 추가
# 실행: docker compose up -d

services:
  # RDS-A 모사 (일반 서비스 DB)
  mysql-a:
    image: mysql:8.0
    container_name: pocketstock-mysql-a
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: localdev
    volumes:
      - ./scripts/mysql-a-init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-a-data:/var/lib/mysql

  # RDS-B 모사 (원장 서비스 DB, 물리 격리)
  mysql-b:
    image: mysql:8.0
    container_name: pocketstock-mysql-b
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: localdev
    volumes:
      - ./scripts/mysql-b-init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-b-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: pocketstock-redis
    ports:
      - "6379:6379"

  # Kafka (KRaft 모드 — Zookeeper 불필요)
  kafka:
    image: bitnami/kafka:3.7
    container_name: pocketstock-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes

volumes:
  mysql-a-data:
  mysql-b-data:
