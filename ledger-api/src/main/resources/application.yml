server:
  port: 8082

spring:
  application:
    name: ledger-api

  # Feign HTTP 클라이언트를 OkHttp로 교체 — 기본 HttpURLConnection은 PATCH를 지원하지 않음.
  # ledger→core 원천 차감/수집완료 표시(deduct·mark-collected)가 PATCH라 필수.
  cloud:
    openfeign:
      okhttp:
        enabled: true

  # DB B (pocketstock_ledger @ mysql-b:3307, 원장) - cma/exchange/trading
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/pocketstock_ledger?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:                              # 알림 이벤트 발행(Outbox 릴레이, #204)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all                            # 리더+팔로워 ack — 발행 유실 최소화(Outbox와 합쳐 at-least-once)
      properties:
        enable.idempotence: true           # 프로듀서 재시도 중복 방지
        delivery.timeout.ms: 5000          # 브로커 장애 시 outbox 폴링 스레드 장기 블로킹 방지
        request.timeout.ms: 3000
        retry.backoff.ms: 1000
        max.block.ms: 3000                 # 메타데이터 조회 실패도 빠르게 실패시켜 다음 폴링에서 재시도

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# LS증권 오픈API — 시크릿은 커밋 금지(환경변수/application-local.yml로 주입)
ls:
  api:
    base-url: ${LS_API_BASE_URL:https://openapi.ls-sec.co.kr:8080}
    #    realtime-url: ${LS_API_REALTIME_URL:wss://openapi.ls-sec.co.kr:9443/websocket}
    realtime-url: ${LS_API_REALTIME_URL:wss://openapi.ls-sec.co.kr:29443/websocket}
    app-key: ${LS_APP_KEY:}
    app-secret-key: ${LS_APP_SECRET_KEY:}

# 한국투자증권(KIS) 오픈API — 해외주식 실시간. 시크릿은 커밋 금지(application-local.yml/환경변수)
# 도메인 기본값 = 실전. 모의면 base-url openapivts:29443 / realtime ops:31000 으로 override.
kis:
  api:
    base-url: ${KIS_API_BASE_URL:https://openapi.koreainvestment.com:9443}
    realtime-url: ${KIS_API_REALTIME_URL:ws://ops.koreainvestment.com:21000}
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}

# 환전 정책 — 적용환율 = 매매기준율 × (1 ± spread×(1−preferential-rate)). 비용은 환율 내재(수수료 0). (backend#54)
exchange:
  spread:
    USD: 0.0096          # 전신환(송금) 스프레드 0.96% — 신한 고시 기준
  preferential-rate: 0.90 # 환율 우대율 90%(기본70+계좌10+이벤트10), 변동 가능
  # 외부 환율 폴백(야후) — WS(LS CUR) 첫 틱 전 부팅 시드 + 캐시 미스 시 최후의 수단. meta만 사용(캔들 불필요).
  fx-source-url: ${FX_SOURCE_URL:https://query1.finance.yahoo.com/v8/finance/chart/KRW=X?interval=1d&range=1d}

feign:
  core-api:
    url: ${CORE_API_URL:http://localhost:8081}

dart:
  api:
    key: ${DART_API_KEY:}
    base-url: https://opendart.fss.or.kr

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}            # 토큰 검증용(공유 JwtProvider) — 필수, core-api와 동일 값

# 계좌번호 암호화 키 — 시크릿은 커밋 금지(환경변수/application-local.yml로 주입). 미주입 시 부팅 실패(fail-fast).
account:
  cipher:
    secret: ${ACCOUNT_CIPHER_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pocketstock: DEBUG
    org.mybatis: DEBUG
