server:
  port: 8082

spring:
  application:
    name: ledger-api

  # DB B (pocketstock_ledger @ mysql-b:3307, 원장) - cma/exchange/trading
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/pocketstock_ledger?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# LS증권 오픈API — 시크릿은 커밋 금지(환경변수/application-local.yml로 주입)
ls:
  api:
    base-url: ${LS_API_BASE_URL:https://openapi.ls-sec.co.kr:8080}
#    realtime-url: ${LS_API_REALTIME_URL:wss://openapi.ls-sec.co.kr:9443/websocket}
    realtime-url: ${LS_API_REALTIME_URL:wss://openapi.ls-sec.co.kr:9443/websocket}
    app-key: ${LS_APP_KEY:}
    app-secret-key: ${LS_APP_SECRET_KEY:}

# 한국투자증권(KIS) 오픈API — 해외주식 실시간. 시크릿은 커밋 금지(application-local.yml/환경변수)
# 도메인 기본값 = 실전. 모의면 base-url openapivts:29443 / realtime ops:31000 으로 override.
kis:
  api:
    base-url: ${KIS_API_BASE_URL:https://openapi.koreainvestment.com:9443}
    realtime-url: ${KIS_API_REALTIME_URL:ws://ops.koreainvestment.com:21000}
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}

feign:
  core-api:
    url: ${CORE_API_URL:http://localhost:8081}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}            # 토큰 검증용(공유 JwtProvider) — 필수, core-api와 동일 값

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pocketstock: DEBUG
    org.mybatis: DEBUG

---
# local 프로파일 = 개발 전용. 운영에선 이 프로파일을 켜지 않으므로 ${JWT_SECRET}(필수) 유지.
spring:
  config:
    activate:
      on-profile: local
jwt:
  secret: pocketstock-local-dev-secret-please-change-in-prod-0123456789  # 개발 전용(운영 금지, core-api와 동일)
