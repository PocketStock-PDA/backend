server:
  port: 8082

spring:
  application:
    name: ledger-api

  # DB B (pocketstock_ledger @ mysql-b:3307, 원장) - cma/exchange/trading
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/pocketstock_ledger?serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pocketstock: DEBUG
    org.mybatis: DEBUG
