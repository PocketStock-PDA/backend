server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Docker Compose 내부 DNS로 서비스명 통신 (Eureka 미사용)
      routes:
        - id: user
          uri: http://user:8081
          predicates:
            - Path=/api/users/**, /api/auth/**
        - id: asset
          uri: http://asset:8082
          predicates:
            - Path=/api/assets/**
        - id: portfolio
          uri: http://portfolio:8083
          predicates:
            - Path=/api/portfolio/**
        - id: budget
          uri: http://budget:8084
          predicates:
            - Path=/api/budget/**
        - id: notification
          uri: http://notification:8085
          predicates:
            - Path=/api/notifications/**
        - id: cma
          uri: http://cma:8086
          predicates:
            - Path=/api/cma/**
        - id: trading
          uri: http://trading:8087
          predicates:
            - Path=/api/trading/**
        - id: exchange
          uri: http://exchange:8088
          predicates:
            - Path=/api/exchange/**

management:
  endpoints:
    web:
      exposure:
        include: health,info             # 헬스체크 노출 (/actuator/health)
  endpoint:
    health:
      show-details: always
