# PocketStock API 게이트웨이 — 단일 진입점에서 경로 보고 core/ledger 로 분기 (MSA gateway 역할)
# nginx 가 /etc/nginx/conf.d/*.conf 를 http 컨텍스트에 자동 include.
#
# ⚠ upstream(core-api / ledger-api) 정의는 여기 두지 않는다.
#   무중단 배포(Blue-Green)에서 활성 색(blue/green)을 가리키는 upstream 은
#   deploy-release.sh 가 생성하는 untracked 파일 active-upstream.conf 에 있다.
#   (그 파일도 *.conf 글롭으로 자동 로드되며, default.conf 보다 알파벳 앞이라 먼저 읽힘.)
#   여기 upstream 을 다시 정의하면 active-upstream.conf 와 "duplicate upstream" 충돌.

server {
    listen 80;
    server_name _;

    # ---- ACME (Let's Encrypt HTTP-01 webroot) ----
    # certbot 이 /var/www/certbot/.well-known/acme-challenge/ 에 챌린지 파일을 쓰고
    # nginx 가 80 으로 서빙 → Let's Encrypt 가 받아 인증서 발급/갱신.
    # ^~ 로 우선순위 확보(아래 라우팅/리다이렉트보다 먼저 매칭). HTTPS 전환 후에도 renew 위해 80 에 유지.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- 라우팅 (HTTP 단계) ----
    # ⚠ HTTPS 전환(api-ssl.conf 활성화) 후에는 아래 include 한 줄을
    #       return 301 https://$host$request_uri;
    #    로 교체해 80→443 리다이렉트로 바꿀 것. (위 ACME location 은 그대로 둬야 renew 가능)
    include /etc/nginx/conf.d/_proxy-locations.inc;
}
