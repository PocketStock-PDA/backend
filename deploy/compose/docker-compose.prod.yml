# 운영(데모) compose — EC2 1대: nginx 게이트웨이 + core/ledger + redis
# 이미지는 EC2에서 빌드하지 않고 ECR에서 pull (CICD가 git-SHA 태그로 push).
#   ECR_REGISTRY : .env 에서 주입 (예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com)
#   IMAGE_TAG    : 배포 스크립트가 릴리스 SHA로 주입 (deploy-release.sh 가 export)
# DB는 외부 RDS(환경변수로 endpoint 주입). 시크릿/endpoint는 같은 폴더의 .env 에서 읽음.
# 실행:  cd deploy/compose && IMAGE_TAG=<sha> docker compose -f docker-compose.prod.yml up -d
#   (수동 빌드가 필요하면 docker-compose.prod.yml 대신 별도 build compose 사용)

services:
  core-api:
    image: ${ECR_REGISTRY}/pocketstock/core-api:${IMAGE_TAG}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: UTC
      DB_URL: "jdbc:mysql://${RDS_CORE_ENDPOINT}:3306/pocketstock_main?serverTimezone=UTC&characterEncoding=UTF-8&sslMode=REQUIRED"
      DB_USERNAME: ${CORE_DB_USERNAME}
      DB_PASSWORD: ${CORE_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LEDGER_API_URL: http://ledger-api:8082
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@pocketstock.app}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  ledger-api:
    image: ${ECR_REGISTRY}/pocketstock/ledger-api:${IMAGE_TAG}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: UTC
      DB_URL: "jdbc:mysql://${RDS_LEDGER_ENDPOINT}:3306/pocketstock_ledger?serverTimezone=UTC&characterEncoding=UTF-8&sslMode=REQUIRED"
      DB_USERNAME: ${LEDGER_DB_USERNAME}
      DB_PASSWORD: ${LEDGER_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CORE_API_URL: http://core-api:8081
      JWT_SECRET: ${JWT_SECRET}
      ACCOUNT_CIPHER_SECRET: ${ACCOUNT_CIPHER_SECRET}
      LS_APP_KEY: ${LS_APP_KEY:-}
      LS_APP_SECRET_KEY: ${LS_APP_SECRET_KEY:-}
      KIS_APP_KEY: ${KIS_APP_KEY:-}
      KIS_APP_SECRET: ${KIS_APP_SECRET:-}
      DART_API_KEY: ${DART_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"   # HTTPS 전환 전엔 443 리스너 없음(연결 거부) → 무해. api-ssl.conf 활성화 시 사용.
    volumes:
      # 단일 파일이 아니라 conf.d 디렉터리째 마운트 → api-ssl.conf.disabled rename 만으로 443 활성(compose 재수정 불요)
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro      # ACME 챌린지 서빙(읽기). certbot 이 같은 볼륨에 토큰 기록.
      - certbot-conf:/etc/letsencrypt:ro      # 발급된 인증서 읽기. 발급 전엔 빈 볼륨(참조하는 server 없어 무해).
    depends_on:
      core-api:
        condition: service_healthy
      ledger-api:
        condition: service_healthy
    restart: unless-stopped

  # 인증서 발급/갱신 전용 — profiles 로 격리되어 평소 `up -d` 엔 안 뜸(deploy-release.sh 영향 없음).
  # 발급: docker compose -p pocketstock -f docker-compose.prod.yml --env-file .env \
  #         run --rm certbot certonly --webroot -w /var/www/certbot \
  #         -d api.<도메인> --email <메일> --agree-tos --no-eff-email
  # 갱신: ... run --rm certbot renew   (이후 nginx -s reload)
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt

volumes:
  certbot-www:
  certbot-conf:
